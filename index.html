<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Tareas - TodoList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/default.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="wrapper">
        <!-- Header -->
        <header class="header-section mb-5">
            <div class="container-fluid py-4">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h1 class="display-5 fw-bold text-white mb-0">
                            <i class="bi bi-check2-square"></i> Mi Lista de Tareas
                        </h1>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <p class="text-white-50 mb-0" id="taskStats">
                            <span id="totalTasks">0</span> tareas • 
                            <span id="completedTasks">0</span> completadas
                        </p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Container -->
        <main class="container pb-5">
            <!-- Add Task Section -->
            <div class="row mb-4">
                <div class="col-lg-8 offset-lg-2">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <form id="taskForm" class="d-flex gap-2">
                                <input 
                                    type="text" 
                                    id="taskInput" 
                                    class="form-control form-control-lg" 
                                    placeholder="Añade una nueva tarea..."
                                    autocomplete="off"
                                    required
                                >
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-plus-lg"></i> Añadir
                                </button>
                                <button type="button" id="clearCompletedBtn" class="btn btn-outline-danger">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="row mb-4">
                <div class="col-lg-8 offset-lg-2">
                    <ul class="nav nav-tabs nav-fill" id="filterTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all" type="button" role="tab" aria-controls="all" aria-selected="true">
                                Todas
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="pending-tab" data-bs-toggle="tab" data-bs-target="#pending" type="button" role="tab" aria-controls="pending" aria-selected="false">
                                Pendientes
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="completed-tab" data-bs-toggle="tab" data-bs-target="#completed" type="button" role="tab" aria-controls="completed" aria-selected="false">
                                Completadas
                            </button>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="row">
                <div class="col-lg-8 offset-lg-2">
                    <div class="tab-content" id="filterTabsContent">
                        <!-- All Tasks -->
                        <div class="tab-pane fade show active" id="all" role="tabpanel" aria-labelledby="all-tab">
                            <div id="tasksContainer" class="tasks-container">
                                <div class="empty-state text-center py-5">
                                    <i class="bi bi-inbox display-1 text-muted"></i>
                                    <p class="text-muted mt-3">No hay tareas aún. ¡Crea tu primera tarea!</p>
                                </div>
                            </div>
                        </div>

                        <!-- Pending Tasks -->
                        <div class="tab-pane fade" id="pending" role="tabpanel" aria-labelledby="pending-tab">
                            <div id="pendingTasksContainer" class="tasks-container">
                                <div class="empty-state text-center py-5">
                                    <i class="bi bi-check-circle display-1 text-muted"></i>
                                    <p class="text-muted mt-3">¡Todas tus tareas están completadas!</p>
                                </div>
                            </div>
                        </div>

                        <!-- Completed Tasks -->
                        <div class="tab-pane fade" id="completed" role="tabpanel" aria-labelledby="completed-tab">
                            <div id="completedTasksContainer" class="tasks-container">
                                <div class="empty-state text-center py-5">
                                    <i class="bi bi-inbox display-1 text-muted"></i>
                                    <p class="text-muted mt-3">No hay tareas completadas</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for Task Item (hidden) -->
    <template id="taskItemTemplate">
        <div class="card task-item mb-2 border-0 shadow-sm transition-smooth" data-task-id="">
            <div class="card-body p-3">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <input class="form-check-input task-checkbox" type="checkbox" data-task-id="">
                    </div>
                    <div class="col">
                        <h6 class="card-title task-text mb-0"></h6>
                        <small class="text-muted task-date"></small>
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-sm btn-outline-danger delete-btn" data-task-id="">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Footer -->
    <footer class="footer-section mt-5">
        <div class="container-fluid py-4">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <p class="text-white-50 mb-0">
                        <i class="bi bi-check2-square"></i> Mi Lista de Tareas © <span id="year"></span>
                    </p>
                </div>
                <div class="col-md-6 text-md-end">
                    <div class="footer-links">
                        <a href="#" class="text-white-50 me-3" title="Inicio"><i class="bi bi-house"></i></a>
                        <a href="#" class="text-white-50 me-3" title="GitHub"><i class="bi bi-github"></i></a>
                        <a href="#" class="text-white-50 me-3" title="Contacto"><i class="bi bi-envelope"></i></a>
                        <a href="#" class="text-white-50" title="Ayuda"><i class="bi bi-question-circle"></i></a>
                    </div>
                </div>
            </div>
            <hr class="border-secondary my-3">
            <div class="row">
                <div class="col-12 text-center">
                    <p class="text-white-50 mb-0 small">
                        Diseñado para mejorar tu productividad
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/alertify.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Actualizar el año automáticamente
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
